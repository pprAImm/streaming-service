name: Transcode Videos

on:
  workflow_dispatch:
    inputs:
      csv:
        description: 'CSV content (base64-encoded)'
        required: true

env:
  IMAGE: ghcr.io/ppraimm/transcoder

jobs:
  transcode:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push transcoder image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.transcoder
          push: true
          tags: ${{ env.IMAGE }}:latest

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Run transcoder on server
        run: |
          # Decode CSV and write to file
          echo "${{ github.event.inputs.csv }}" | base64 -d > /tmp/input.csv

          # Copy CSV to server
          scp -o StrictHostKeyChecking=no /tmp/input.csv root@185.23.34.25:/root/transcode-input.csv

          ssh -o StrictHostKeyChecking=no root@185.23.34.25 << 'EOF'
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_TOKEN }}
            docker pull ${{ env.IMAGE }}:latest
            docker run --rm \
              --name transcoder \
              -v /root/videos:/app/videos \
              -v /root/transcoded:/app/transcoded \
              -v /root/transcode-input.csv:/app/input.csv \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e VIDEOS_DIR=/app/videos \
              -e TRANSCODE_DIR=/app/transcoded \
              -e STREAM_BASE_URL="http://185.23.34.25:8082/stream" \
              ${{ env.IMAGE }}:latest /app/input.csv
            rm -f /root/transcode-input.csv
          EOF
